<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mac home screen </title>
    <link rel="stylesheet" href="./styles.css">
    <link rel="icon" href="./apple-logo-svgrepo-com.svg">
</head>

<body oncontextmenu="return false;">

    <div class="control-panel">
        <div class="left-panel">
            <img src="./images/apple-logo.svg" alt="apple-logo" height="15px">
            <p style="font-weight: bold;">Finder</p>
            <p>File</p>
            <p>Edit</p>
            <p>View</p>
            <p>Go</p>
            <p>Window</p>
            <p>Help</p>
        </div>

        <div class="right-panel">
            <p id="date"></p>
            <p id="time"></p>
        </div>
    </div>

    <div class="app-panel">
        <div class="app-dock">
            <img id="Finder" class="finder-icon" src="./images/finder.png" alt="finder" height="50px">
            <img id="Weather" class="weather-icon" src="./images/weather.png" alt="weather" height="50px">
            <img id="Shortcuts" class="shortcuts-icon" src="./images/shortcuts.png" alt="shortcuts" height="50px">
            <img id="Safari" class="safari-icon" src="./images/safari.png" alt="safari" height="50px">
            <img id="Podcast" class="podcast-icon" src="./images/podcast.png" alt="podcast" height="50px">
            <img id="Photos" class="photos-icon" src="./images/photos.png" alt="photos" height="50px">
            <img id="Notes" class="notes-icon" src="./images/notes.png" alt="notes" height="50px">
            <img id="News" class="news-icon" src="./images/news.png" alt="news" height="50px">
            <img id="Music" class="music-icon" src="./images/music.png" alt="music" height="50px">
            <img id="Messages" class="messages-icon" src="./images/messages.png" alt="messages" height="50px">
            <img id="Maps" class="maps-icon" src="./images/maps.png" alt="maps" height="50px">
            <img id="Mail" class="mail-icon" src="./images/mail.png" alt="mail" height="50px">
            <img id="Freeform" class="freeform-icon" src="./images/freeform.png" alt="freeform" height="50px">
            <img id="findMy" class="findMy-icon" src="./images/findMy.png" alt="findMy" height="50px">
            <img id="Facetime" class="facetime-icon" src="./images/facetime.png" alt="facetime" height="50px">
            <img id="Clock" class="clock-icon" src="./images/clock.png" alt="clock" height="50px">
            <img id="Calculator" class="calculator-icon" src="./images/calculator.png" alt="calculator" height="50px">
            <img id="Tv" class="tv-icon" src="./images/tv.PNG" alt="apple-tv" height="50px">
            <img id="App Store" class="app-store-icon" src="./images/AppIcon.PNG" alt="app-store" height="50px">
            <div class="separating-bar"></div>
            <img src="./images/trash.png" alt="trash-icon" height="50px">
        </div>
    </div>


    <div id="customContextMenu" class="context-menu">
        <ul>
            <li>New Folder</li>
            <li>Get Info</li>
            <li>Customize Wallpaper</li>
        </ul>
    </div>

    <script src="./script.js"></script>
    <script src="./contextMenu.js"></script>
    <script src="./apps.js"></script>


</body>

</html>
